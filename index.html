<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerador de Termos | GRAFICA E EDITORA POSIGRAF LTDA</title>
  <script>
    (function () {
      try {
        var storageKey = "genterm-theme";
        var savedTheme = localStorage.getItem(storageKey);
        var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
        document.documentElement.dataset.theme = savedTheme || (prefersDark ? "dark" : "light");
      } catch (error) {
        document.documentElement.dataset.theme = "light";
      }
    })();
  </script>
  <link rel="stylesheet" href="src/css/style.css">
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script defer src="src/js/vendor/xlsx.full.min.js"></script>
  <script defer src="src/js/utils/form-utils.js"></script>
  <script defer src="src/js/utils/pdf-utils.js"></script>
  <script defer src="src/js/utils/html-utils.js"></script>
  <script defer src="src/js/models/document-specs.js"></script>
  <script defer src="src/js/utils/preview-utils.js"></script>
  <script defer src="src/js/data/app-data.js"></script>
  <script defer src="src/js/data/spreadsheet-parser.js"></script>
  <script defer src="src/js/models/term-model.js"></script>
  <script defer src="src/js/models/batch-model.js"></script>
  <script defer src="src/js/controllers/form-controllers.js"></script>
  <script defer src="src/js/controllers/batch-controller.js"></script>
  <script defer src="src/js/ui/html-loader.js"></script>
  <script defer src="src/js/templates/components/site-header-template.js"></script>
  <script defer src="src/js/templates/pages/responsabilidade-template.js"></script>
  <script defer src="src/js/templates/pages/devolucao-template.js"></script>
  <script defer src="src/js/templates/pages/lote-template.js"></script>
  <script defer src="src/js/ui/layout.js"></script>
  <script defer src="src/js/ui/theme.js"></script>
  <script defer src="src/js/app.js"></script>
</head>
<body>
  <div data-html-include="src/html/components/site-header.html"></div>

  <div class="site-shell">
    <main class="landing-main">
      <section class="workspace" aria-live="polite">
        <div data-html-include="src/html/pages/responsabilidade.html"></div>
